---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: dummy-backend
  namespace: dummy-backend
spec:
  filterTags:
    pattern: '.*-rc.*'  # Only accept release candidate tags (e.g., 1.0.0-rc.1, 1.0.0-rc.2)
  policy:
    semver:
      range: '>=0.0.0-0'  # Selects the latest semver version including pre-releases (the -0 suffix includes pre-releases)
